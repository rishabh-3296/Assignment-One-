<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikachu UI</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="main"></div>
    <div class="left"></div>

     <img
        class="logo"
        src="https://pngimg.com/uploads/pokemon/pokemon_PNG15.png"
        alt=""
      />

      <div class="content">

        <h4 class="small-text">POKEMON GEN I</h4>

        <h1>Pikachu</h1>

        <p>
          Pikachu is an Electric-type Pokémon introduced
          in Generation I. Pikachu are small, chubby,
          and incredibly cute mouse-like Pokémon.
          They are almost completely covered by
          yellow fur.
        </p>
         </div>

      <div class="count">
        <div class="line"></div>
        
        <h2>01 / 08</h2>
      </div>

      <div class="circle"></div>

    </div>

    <!-- RIGHT SECTION -->
    <div class="right">

      <i class="ri-menu-line menu"></i>

      <div class="dots">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

    </div>

    <!-- PIKACHU IMAGE -->
    <img
      class="pikachu"
      src="https://pngimg.com/d/pokemon_PNG148.png"
      alt=""
    />

  </div>

</html>
